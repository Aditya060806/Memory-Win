name: Continuous Integration

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  pull_request:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        shell: pwsh
        run: nuget restore src\MemoryWin.sln

      - name: Build solution (Release)
        shell: pwsh
        run: msbuild src\MemoryWin.sln /m /p:Configuration=Release /p:Platform="Any CPU"

      - name: Run unit tests
        shell: pwsh
        run: |
          $runner = "src\packages\NUnit.Runners.2.6.4\tools\nunit-console.exe"
          if (-Not (Test-Path $runner)) { Write-Host "::error::Test runner not found at $runner"; exit 1 }
          Write-Host "Running tests..."
          & $runner "src\bin\Release\MemoryWin.exe" /xml:TestResults.xml
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::Tests failed with exit code $LASTEXITCODE"; exit $LASTEXITCODE }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: TestResults.xml
          retention-days: 14

      - name: Upload build (MemoryWin.exe)
        uses: actions/upload-artifact@v4
        with:
          name: memory-win-ci-${{ github.run_number }}
          path: src\bin\Release\MemoryWin.exe
          if-no-files-found: error
