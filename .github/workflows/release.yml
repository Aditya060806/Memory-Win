name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.0.1)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and Publish Release
    runs-on: windows-latest

    steps:
      - name: Resolve tag
        id: tag
        shell: pwsh
        run: |
          $tag = if ('${{ github.event_name }}' -eq 'workflow_dispatch') { '${{ inputs.tag }}' } else { '${{ github.ref_name }}' }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Building release for tag: $tag"

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        shell: pwsh
        run: nuget restore src\MemoryWin.sln

      - name: Build solution (Release)
        shell: pwsh
        run: msbuild src\MemoryWin.sln /m /p:Configuration=Release /p:Platform="Any CPU"

      - name: Run unit tests (release gate)
        shell: pwsh
        run: |
          $runner = "src\packages\NUnit.Runners.2.6.4\tools\nunit-console.exe"
          if (-Not (Test-Path $runner)) { Write-Host "::error::Test runner not found"; exit 1 }
          & $runner "src\bin\Release\MemoryWin.exe" /xml:TestResults.xml
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::Tests failed"; exit $LASTEXITCODE }

      - name: Package release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "src\bin\Release\MemoryWin.exe" dist\
          Copy-Item "README.md" dist\
          Copy-Item "CHANGELOG.md" dist\
          Compress-Archive -Path dist\MemoryWin.exe, dist\README.md, dist\CHANGELOG.md -DestinationPath dist\MemoryWin.zip -Force
          Get-FileHash -Algorithm SHA256 dist\MemoryWin.exe, dist\MemoryWin.zip | ForEach-Object {
            $_.Hash.ToLower() + "  " + (Split-Path -Leaf $_.Path)
          } | Out-File -FilePath dist\checksums.txt -Encoding ascii
          Get-Content dist\checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Memory-Win ${{ steps.tag.outputs.tag }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            dist/MemoryWin.exe
            dist/MemoryWin.zip
            dist/checksums.txt
